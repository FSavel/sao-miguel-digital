<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Calendário Pastoral</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container">

    <!-- TÍTULO -->
    <h1 class="titulo-principal">
        📅 Calendário Pastoral
    </h1>

    <p class="frase-biblica">
        “Para tudo há um tempo determinado.” — Eclesiastes 3:1
    </p>

    <!-- LISTA DE EVENTOS -->
    {% if calendario %}

        {% for c in calendario %}

        <div class="card">

            <h2>📌 {{ c.evento }}</h2>

            <p>📆 {{ c.data }}</p>

            <p>{{ c.descricao }}</p>

        </div>

        {% endfor %}

    {% else %}

        <div class="card">
            <p>Nenhum evento disponível no calendário.</p>
        </div>

    {% endif %}

    <!-- BOTÃO -->
    <a href="/" class="botao">
        🏠 Voltar ao Início
    </a>

</div>

</div>

</body>
</html>
