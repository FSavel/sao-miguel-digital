<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cânticos</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container">

    <!-- TÍTULO -->

    <h1 class="titulo-principal">
        🎵 Cânticos Litúrgicos
    </h1>

    <p class="frase-biblica">
        “Cantai ao Senhor um cântico novo.” — Salmo 96:1
    </p>

    <!-- LISTA DE CÂNTICOS -->

    {% for c in canticos %}

    <div class="card">

        <h2>
            🎼 {{ c.momento }}
        </h2>

        <p>
            <b>{{ c.cantico }}</b>
        </p>

        <hr>

        <h3>📜 Letra</h3>

        <p style="white-space: pre-line;">
            {{ c.letra }}
        </p>

    </div>

    {% endfor %}

    <!-- VOLTAR -->

    <a href="/" class="botao">
        🏠 Voltar ao Início
    </a>

</div>

</div>

</body>
</html>
