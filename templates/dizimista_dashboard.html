<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Área do Dizimista</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="overlay">

    <div class="container">

        <!-- =========================
             TÍTULO
        ========================= -->
        <div class="card">

            <h2>👤 Área do Dizimista</h2>

            <p class="saudacao-dizimista">
                Olá, {{ user.nome }}
            </p>

        </div>

        <!-- =========================
             RESUMO
        ========================= -->
        <div class="card">

            <h3>Total de Contribuições</h3>

            <p class="total-contribuicoes">
                {{ contribuicoes | length }} registo(s)
            </p>

        </div>

        <!-- =========================
             PDF
        ========================= -->
        <div class="card">

            <a href="/export_extrato_pdf" class="botao botao-pdf">
                📄 Baixar Extrato em PDF
            </a>

        </div>

        <!-- =========================
             HISTÓRICO
        ========================= -->
        <div class="card">

            <h3>📊 Histórico de Contribuições</h3>

            <div class="table-responsive">

                <table>

                    <tr>
                        <th>Data</th>
                        <th>Valor</th>
                    </tr>

                    {% for c in contribuicoes %}
                    <tr>
                        <td>{{ c.data }}</td>
                        <td class="valor-destaque">{{ c.valor }} MZN</td>
                    </tr>
                    {% endfor %}

                </table>

            </div>

        </div>

        <!-- =========================
             SAIR
        ========================= -->
        <div class="card">

            <a href="/dizimista_logout" class="botao botao-sair">
                🚪 Sair
            </a>

        </div>

    </div>

</div>

</body>
</html>
