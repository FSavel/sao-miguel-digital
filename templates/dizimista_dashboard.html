<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Área do Dizimista</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="overlay">

    <div class="container">

        <!-- =========================
             TÍTULO
        ========================= -->
        <h1 class="titulo-principal">
            👤 Área do Dizimista
        </h1>

        <!-- =========================
             SAUDAÇÃO
        ========================= -->
        <h2 class="saudacao-dizimista">
            Olá, {{ user.nome }}
        </h2>

        <!-- =========================
             MENSAGEM
        ========================= -->
        <p class="mensagem-dizimista">
            🙏 Obrigado por apoiar a missão da Paróquia São Miguel Arcanjo 🙏
        </p>

        <!-- =========================
             TOTAL
        ========================= -->
        <div class="card">

            <p class="total-label">
                Total de Contribuições:
                <span class="total-valor">
                    {{ total }} MZN
                </span>
            </p>

        </div>

        <!-- =========================
             BOTÃO PDF
        ========================= -->
        <div class="card">

            <a href="/export_extrato_pdf" class="botao botao-pdf">
                📄 Baixar Extrato em PDF
            </a>

        </div>

        <!-- =========================
             HISTÓRICO
        ========================= -->
        <div class="card">

            <h2>📊 Histórico de Contribuições</h2>

            <div class="table-responsive">

                <table>

                    <tr>
                        <th>Data</th>
                        <th>Valor</th>
                    </tr>

                    {% for c in contribuicoes %}

                    <tr>
                        <td>{{ c.data }}</td>
                        <td>{{ c.valor }} MZN</td>
                    </tr>

                    {% endfor %}

                </table>

            </div>

        </div>

        <!-- =========================
             LOGOUT
        ========================= -->
        <div class="card">

            <a href="/dizimista_logout" class="botao botao-sair">
                🚪 Sair
            </a>

        </div>

    </div>

</div>

</body>
</html>
