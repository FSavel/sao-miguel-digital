<!DOCTYPE html>
<html>
<head>
    <title>Login Dizimista</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="overlay">
<div class="container">

<h2>🔐 Área do Dizimista</h2>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<form method="POST" class="login-form">

    <input type="text" name="numero" placeholder="Número de Dizimista" required>
    <input type="password" name="password" placeholder="Palavra-passe" required>

    <button class="botao" type="submit">Entrar</button>

</form>

</div>
</div>

</body>
</html>
