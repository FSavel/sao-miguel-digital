<!DOCTYPE html>
<html>
<head>
    <title>Login Dizimista</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="overlay">
<div class="container">

<h2>🔐 Área do Dizimista</h2>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<form method="POST" class="login-form">

    <input 
        type="text" 
        name="numero" 
        placeholder="Número de Dizimista" 
        required
        inputmode="numeric"
        autocomplete="username"
    >

    <!-- PASSWORD + BOTÃO MOSTRAR -->
    <div style="position:relative; width:100%;">

        <input 
            type="password" 
            name="password" 
            id="password"
            placeholder="Palavra-passe" 
            required
            autocomplete="current-password"
            style="padding-right:50px;"
        >

        <button 
            type="button" 
            onclick="togglePassword()" 
            style="
                position:absolute;
                right:10px;
                top:50%;
                transform:translateY(-50%);
                background:none;
                border:none;
                cursor:pointer;
                font-size:14px;
                color:#333;
                font-weight:bold;
            "
        >
            👁️
        </button>

    </div>

    <button class="botao" type="submit">Entrar</button>

</form>

</div>
</div>

<!-- SCRIPT MOSTRAR PASSWORD -->
<script>
function togglePassword() {
    const input = document.getElementById("password");

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>

</body>
</html>
