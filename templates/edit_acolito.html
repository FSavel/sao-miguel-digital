<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Escala de Acólitos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 20px 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; color: #8b0000; text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #666; margin-bottom: 25px; font-style: italic; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
        
        label { font-size: 14px; font-weight: 700; color: #444; margin: 15px 0 5px 5px; display: block; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #e1e1e1; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: #8b0000; outline: none; background: #fffcfc; }
        
        .btn-salvar { 
            background: #8b0000; color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: bold; font-size: 16px; 
            width: 100%; margin-top: 25px; cursor: pointer;
        }
        .btn-voltar { 
            display: block; text-align: center; color: #666; text-decoration: none; 
            margin-top: 20px; font-weight: 600; font-size: 14px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="titulo-principal">⛪ Editar {{ missa }}ª Missa</h1>
    <p class="sub">“Servi ao Senhor com alegria.”</p>

    <div class="card">
        <form method="POST">
            <input type="hidden" name="missa" value="{{ missa }}">
            
            <div class="form-grid">
                <div>
                    <label>Cruciferário</label>
                    <input type="text" name="cruciferario" value="{{ acolito.cruciferario if acolito.cruciferario else '' }}" required placeholder="Nome...">
                </div>
                <div>
                    <label>Turiferário</label>
                    <input type="text" name="turiferario" value="{{ acolito.turiferario if acolito.turiferario else '' }}" placeholder="Nome...">
                </div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Naveteiro</label>
                    <input type="text" name="naveteiro" value="{{ acolito.naveteiro if acolito.naveteiro else '' }}" placeholder="Nome...">
                </div>
                <div>
                    <label>Cerimoniário</label>
                    <input type="text" name="cerimoniario" value="{{ acolito.cerimoniario if acolito.cerimoniario else '' }}" placeholder="Nome...">
                </div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Velas</label>
                    <input type="text" name="velas" value="{{ acolito.velas if acolito.velas else '' }}" placeholder="Nome...">
                </div>
                <div>
                    <label>Livro (Missal)</label>
                    <input type="text" name="livro" value="{{ acolito.livro if acolito.livro else '' }}" placeholder="Nome...">
                </div>
            </div>

            <label>Altar (Campainha/Credência)</label>
            <input type="text" name="altar" value="{{ acolito.altar if acolito.altar else '' }}" placeholder="Nome...">

            <button class="btn-salvar" type="submit">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="btn-voltar">⬅️ Voltar ao Painel Administrativo</a>
</div>

</body>
</html>
