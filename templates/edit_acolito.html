<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Escala de Acólitos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        label { font-weight: 600; font-size: 14px; margin-bottom: 6px; display: block; color: #333; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; 
            font-size: 15px; margin-bottom: 10px; transition: border 0.3s;
        }
        input:focus { border-color: #8b0000; outline: none; }
        .btn-salvar { 
            background: #8b0000 !important; color: white !important; 
            border: none; padding: 14px; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

<div class="overlay">
<div class="container">

    <h1 class="titulo-principal">⛪ Editar Escala</h1>
    <p class="frase-biblica" style="margin-bottom: 25px;">“Servi ao Senhor com alegria.”</p>

    <div class="card" style="padding: 25px;">
        <form method="POST">
            <div class="form-grid">
                <div>
                    <label>Cruciferário</label>
                    <input type="text" name="cruciferario" value="{{ acolito.cruciferario if acolito.cruciferario else '' }}" required>
                </div>
                <div>
                    <label>Turiferário</label>
                    <input type="text" name="turiferario" value="{{ acolito.turiferario if acolito.turiferario else '' }}">
                </div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Naveteiro</label>
                    <input type="text" name="naveteiro" value="{{ acolito.naveteiro if acolito.naveteiro else '' }}">
                </div>
                <div>
                    <label>Cerimoniário</label>
                    <input type="text" name="cerimoniario" value="{{ acolito.cerimoniario if acolito.cerimoniario else '' }}">
                </div>
            </div>

            <div class="form-grid">
                <div>
                    <label>Velas</label>
                    <input type="text" name="velas" value="{{ acolito.velas if acolito.velas else '' }}">
                </div>
                <div>
                    <label>Livro (Missal)</label>
                    <input type="text" name="livro" value="{{ acolito.livro if acolito.livro else '' }}">
                </div>
            </div>

            <label>Altar (Campainha/Credência)</label>
            <input type="text" name="altar" value="{{ acolito.altar if acolito.altar else '' }}">

            <button class="botao btn-salvar" type="submit" style="margin-top: 20px;">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="botao" style="background: #555; color: white; margin-top: 15px;">⬅️ Voltar ao Painel</a>

</div>
</div>

</body>
</html>
