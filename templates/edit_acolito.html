<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Escala de Acólitos</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">
<div class="container">

    <h1 class="titulo-principal">⛪ Escala de Acólitos</h1>

    <div class="card">

        <form method="POST">

            {% for a in acolitos %}

                <div style="margin-bottom:15px; padding:10px; border:1px solid #ddd; border-radius:8px;">

                    <p><b>Função:</b> {{ a.funcao }}</p>

                    <input 
                        type="text"
                        name="nome_{{ loop.index }}"
                        value="{{ a.nome }}"
                        placeholder="Nome do acólito"
                        required
                    >

                    <input 
                        type="hidden"
                        name="funcao_{{ loop.index }}"
                        value="{{ a.funcao }}"
                    >

                </div>

            {% endfor %}

            <button class="botao" type="submit">
                💾 Guardar Escala
            </button>

        </form>

    </div>

    <a href="/admin" class="botao">⬅️ Voltar</a>

</div>
</div>

</body>
</html>
