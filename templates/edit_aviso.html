<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aviso</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 20px 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; color: #8b0000; text-align: center; margin-bottom: 25px; }
        
        label { font-size: 14px; font-weight: 700; color: #444; margin: 15px 0 5px 5px; display: block; }
        input, textarea { 
            width: 100%; padding: 15px; border: 2px solid #e1e1e1; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; transition: 0.3s; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #8b0000; outline: none; background: #fffcfc; }
        
        .btn-salvar { 
            background: #8b0000; color: white; border: none; padding: 18px; 
            border-radius: 12px; font-weight: bold; font-size: 16px; 
            width: 100%; margin-top: 25px; cursor: pointer;
        }
        .btn-voltar { 
            display: block; text-align: center; color: #666; text-decoration: none; 
            margin-top: 20px; font-weight: 600; font-size: 14px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✏️ Editar Aviso</h1>

    <div class="card">
        <form method="POST">
            <label>📢 Título do Aviso</label>
            <input type="text" name="titulo" value="{{ aviso.titulo if aviso.titulo else '' }}" required placeholder="Ex: Reunião de Catequistas">

            <label>📝 Descrição do Aviso</label>
            <textarea name="descricao" rows="8" required placeholder="Escreva aqui os detalhes do aviso...">{{ aviso.descricao if aviso.descricao else '' }}</textarea>

            <button class="btn-salvar" type="submit">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="btn-voltar">⬅️ Voltar ao Painel Administrativo</a>
</div>

</body>
</html>
