<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Aviso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="overlay">
<div class="container">

    <h1 class="titulo-principal">✏️ Editar Aviso</h1>

    {% set tit = aviso.titulo if aviso is mapping else aviso[0] %}
    {% set desc = aviso.descricao if aviso is mapping else aviso[1] %}

    <div class="card" style="padding: 20px;">
        <form method="POST">

            <label>📢 Título do Aviso</label>
            <input type="text" name="titulo" value="{{ tit if tit is not none else '' }}" required>

            <label style="margin-top: 15px;">📝 Descrição do Aviso</label>
            <textarea name="descricao" rows="6" required>{{ desc if desc is not none else '' }}</textarea>

            <button class="botao" type="submit" style="margin-top: 15px;">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="botao" style="background-color: #555; border-color: #555;">⬅️ Voltar ao Painel</a>

</div>
</div>

</body>
</html>
