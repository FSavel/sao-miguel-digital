<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cântico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="overlay">
<div class="container">

    <h1 class="titulo-principal">🎵 Editar Cântico</h1>

    {% set mom = cantico.momento if cantico is mapping else cantico[0] %}
    {% set can = cantico.cantico if cantico is mapping else cantico[1] %}
    {% set let = cantico.letra if cantico is mapping else cantico[2] %}

    <div class="card" style="padding: 20px;">
        <form method="POST">

            <label>🎼 Momento Litúrgico (ex: Entrada)</label>
            <input type="text" name="momento" value="{{ mom if mom is not none else '' }}" required>

            <label style="margin-top: 15px;">🎵 Nome do Cântico</label>
            <input type="text" name="cantico" value="{{ can if can is not none else '' }}" required>

            <label style="margin-top: 15px;">📜 Letra Completa</label>
            <textarea name="letra" rows="8" required>{{ let if let is not none else '' }}</textarea>

            <button class="botao" type="submit" style="margin-top: 15px;">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="botao" style="background-color: #555; border-color: #555;">⬅️ Voltar ao Painel</a>

</div>
</div>

</body>
</html>
