<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Escala de Leitores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; color: #333; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 15px; margin-bottom: 10px; transition: border 0.3s;
        }
        input:focus { border-color: #8b0000; outline: none; }
        .btn-salvar { 
            background: #8b0000 !important; color: white !important; 
            border: none; padding: 14px; font-weight: bold; width: 100%; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="overlay">
<div class="container">

    <h1 class="titulo-principal">📖 Editar Escala de Leitores</h1>
    <p class="frase-biblica" style="text-align: center; margin-bottom: 25px;">
        “A tua palavra é lâmpada para os meus pés.”
    </p>

    <div class="card" style="padding: 25px;">
        <form method="POST">
            <!-- 1ª Leitura -->
            <div class="form-grid">
                <div>
                    <label>1ª Leitura (Português)</label>
                    <input type="text" name="primeira_pt" value="{{ leitor.primeira_pt if leitor.primeira_pt else '' }}" required placeholder="Nome do leitor">
                </div>
                <div>
                    <label>1ª Leitura (Changana/Ronga)</label>
                    <input type="text" name="primeira_ch" value="{{ leitor.primeira_ch if leitor.primeira_ch else '' }}" placeholder="Nome do leitor">
                </div>
            </div>

            <!-- Salmo -->
            <label>Salmo Responsorial</label>
            <input type="text" name="salmo" value="{{ leitor.salmo if leitor.salmo else '' }}" required placeholder="Nome do salmista">

            <!-- 2ª Leitura -->
            <div class="form-grid">
                <div>
                    <label>2ª Leitura (Português)</label>
                    <input type="text" name="segunda_pt" value="{{ leitor.segunda_pt if leitor.segunda_pt else '' }}" placeholder="Nome do leitor">
                </div>
                <div>
                    <label>2ª Leitura (Changana/Ronga)</label>
                    <input type="text" name="segunda_ch" value="{{ leitor.segunda_ch if leitor.segunda_ch else '' }}" placeholder="Nome do leitor">
                </div>
            </div>

            <!-- Preces -->
            <label>Oração dos Fiéis (Preces)</label>
            <input type="text" name="oracao_fieis" value="{{ leitor.oracao_fieis if leitor.oracao_fieis else '' }}" required placeholder="Nome do leitor">

            <button class="botao btn-salvar" type="submit">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="botao" style="background: #555; color: white; margin-top: 15px;">⬅️ Voltar ao Painel</a>

</div>
</div>

</body>
</html>
