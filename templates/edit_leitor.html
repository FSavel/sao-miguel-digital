<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Escala de Leitores</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">
<div class="container">

    <!-- TÍTULO -->
    <h1 class="titulo-principal">
        📖 Editar Escala de Leitores
    </h1>

    <p class="frase-biblica">
        “A tua palavra é lâmpada para os meus pés.” — Salmo 119:105
    </p>

    <!-- CARD -->
    <div class="card">

        <form method="POST">

            <!-- PRIMEIRA PT -->
            <label><b>1ª Leitura PT</b></label>

            <input 
                type="text"
                name="primeira_pt"
                value="{{ leitor.primeira_pt }}"
                placeholder="1ª Leitura PT"
                required
            >

            <!-- PRIMEIRA CH -->
            <label><b>1ª Leitura CH/Ronga</b></label>

            <input 
                type="text"
                name="primeira_ch"
                value="{{ leitor.primeira_ch }}"
                placeholder="1ª Leitura CH/Ronga"
            >

            <!-- SALMO -->
            <label><b>Salmo</b></label>

            <input 
                type="text"
                name="salmo"
                value="{{ leitor.salmo }}"
                placeholder="Salmo"
                required
            >

            <!-- SEGUNDA PT -->
            <label><b>2ª Leitura PT</b></label>

            <input 
                type="text"
                name="segunda_pt"
                value="{{ leitor.segunda_pt }}"
                placeholder="2ª Leitura PT"
            >

            <!-- SEGUNDA CH -->
            <label><b>2ª Leitura CH/Ronga</b></label>

            <input 
                type="text"
                name="segunda_ch"
                value="{{ leitor.segunda_ch }}"
                placeholder="2ª Leitura CH/Ronga"
            >

            <!-- ORAÇÃO DOS FIÉIS -->
            <label><b>Oração dos Fiéis</b></label>

            <input 
                type="text"
                name="oracao_fieis"
                value="{{ leitor.oracao_fieis }}"
                placeholder="Oração dos Fiéis"
                required
            >

            <!-- BOTÃO -->
            <button class="botao" type="submit">
                💾 Guardar Alterações
            </button>

        </form>

    </div>

    <!-- VOLTAR -->
    <a href="/admin" class="botao">
        ⬅️ Voltar
    </a>

</div>
</div>

</body>
</html>
