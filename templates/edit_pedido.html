<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Pedido de Oração</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        label { 
            display: block; font-weight: 600; font-size: 14px; 
            margin-top: 15px; margin-bottom: 8px; color: #333; 
        }
        input, textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; font-size: 15px; font-family: inherit;
            transition: border-color 0.3s; background: white;
        }
        input:focus, textarea:focus, select:focus { border-color: #8b0000; outline: none; }
        .btn-salvar { 
            background: #8b0000 !important; color: white !important; 
            border: none; padding: 14px; font-weight: bold; width: 100%;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="overlay">
<div class="container" style="max-width: 600px;">

    <h1 class="titulo-principal">🙏 Editar Pedido</h1>

    <div class="card" style="padding: 25px;">
        <form method="POST">
            
            <label>👤 Nome de quem solicita / Intenção</label>
            <input type="text" name="nome" value="{{ pedido.nome if pedido.nome else '' }}" required placeholder="Ex: Família Silva">

            <label>📌 Categoria do Pedido</label>
            <select name="categoria" required>
                {% for cat in ["Saúde", "Família", "Trabalho", "Estudos", "Falecido", "Agradecimento"] %}
                    <option value="{{ cat }}" {% if pedido.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>

            <label>✍️ Descrição da Intenção</label>
            <textarea name="pedido" rows="6" required placeholder="Detalhes do pedido de oração...">{{ pedido.pedido if pedido.pedido else '' }}</textarea>

            <button class="botao btn-salvar" type="submit">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/admin" class="botao" style="background: #555; color: white; margin-top: 15px;">⬅️ Voltar ao Painel</a>

</div>
</div>

</body>
</html>
