<!DOCTYPE html>

<html lang="pt">
<head>

```
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Pedido</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
```

</head>

<body>

<div class="overlay">
<div class="container">

```
<h1 class="titulo-principal">🙏 Editar Pedido</h1>

<div class="card">

    <form method="POST">

        <input 
            type="text" 
            name="nome" 
            value="{{ pedido.nome }}" 
            required
        >

        <select name="categoria" required>

            <option value="Saúde"
                {% if pedido.categoria == "Saúde" %}selected{% endif %}
            >Saúde</option>

            <option value="Família"
                {% if pedido.categoria == "Família" %}selected{% endif %}
            >Família</option>

            <option value="Trabalho"
                {% if pedido.categoria == "Trabalho" %}selected{% endif %}
            >Trabalho</option>

            <option value="Estudos"
                {% if pedido.categoria == "Estudos" %}selected{% endif %}
            >Estudos</option>

            <option value="Falecido"
                {% if pedido.categoria == "Falecido" %}selected{% endif %}
            >Falecido</option>

            <option value="Agradecimento"
                {% if pedido.categoria == "Agradecimento" %}selected{% endif %}
            >Agradecimento</option>

        </select>

        <textarea 
            name="pedido" 
            required
        >{{ pedido.pedido }}</textarea>

        <button class="botao" type="submit">
            💾 Guardar Alterações
        </button>

    </form>

</div>

<a href="/admin" class="botao">⬅️ Voltar</a>
```

</div>
</div>

</body>
</html>
