<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .password-container { position: relative; display: flex; align-items: center; }
        .password-container input { width: 100%; padding-right: 45px; }
        .toggle-pass-btn { position: absolute; right: 10px; background: none; border: none; cursor: pointer; padding: 10px; font-size: 16px; }
        
        .alert-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; }
        .error-alert { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success-alert { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* Estilização dos campos de input para padrão moderno */
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

<div class="overlay">
<div class="container" style="max-width: 500px;">

    <h1 class="titulo-principal" style="margin-bottom: 20px;">✏️ Editar Perfil</h1>

    {% if erro %}
        <div class="alert-box error-alert">⚠️ {{ erro }}</div>
    {% endif %}
    {% if sucesso %}
        <div class="alert-box success-alert">✅ {{ sucesso }}</div>
    {% endif %}

    <div class="card" style="padding: 25px;">
        <form method="POST">
            <label>👤 Nome Completo</label>
            <input type="text" name="nome" value="{{ user.nome if user.nome else '' }}" required>

            <label>📱 Contacto</label>
            <input type="text" name="contacto" value="{{ user.contacto if user.contacto else '' }}">

            <label>📧 Email</label>
            <input type="email" name="email" value="{{ user.email if user.email else '' }}">

            <div style="border-top: 1px solid #eee; margin: 25px 0;"></div>

            <h3 style="margin-bottom: 15px; font-size: 16px;">🔐 Alterar Palavra-passe</h3>

            <label>Palavra-passe Atual</label>
            <div class="password-container">
                <input type="password" name="password_actual" id="password_actual">
                <button type="button" class="toggle-pass-btn" onclick="togglePassword('password_actual')">👁️</button>
            </div>

            <label>Nova Palavra-passe</label>
            <div class="password-container">
                <input type="password" name="nova_password" id="nova_password">
                <button type="button" class="toggle-pass-btn" onclick="togglePassword('nova_password')">👁️</button>
            </div>

            <label>Confirmar Nova Palavra-passe</label>
            <div class="password-container">
                <input type="password" name="confirmar_password" id="confirmar_password">
                <button type="button" class="toggle-pass-btn" onclick="togglePassword('confirmar_password')">👁️</button>
            </div>

            <button type="submit" class="botao" style="background: #8b0000; color: white; margin-top: 20px;">💾 Guardar Alterações</button>
        </form>
    </div>

    <a href="/dizimista_dashboard" class="botao" style="background: #f8f9fa; color: #333; border: 1px solid #ddd; margin-top: 10px;">⬅️ Voltar ao Painel</a>

</div>
</div>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
