<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>São Miguel Digital</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- =========================
     TICKER DE AVISOS
========================= -->
<div class="ticker">
    <div class="ticker-content" id="ticker-content">
        Carregando avisos...
    </div>
</div>

<div class="overlay">

    <div class="container">

        <!-- TÍTULO -->
        <h1 class="titulo-principal">
            Plataforma Digital da Paróquia São Miguel Arcanjo da Manhiça
        </h1>

        <!-- FRASE -->
        <p class="frase-biblica">
            “Eu sou o caminho, a verdade e a vida.” — João 14:6
        </p>

        <br>

        <!-- MENU PRINCIPAL -->
        <a href="/avisos" class="botao">📢 Avisos Semanais</a>

        <a href="/leituras" class="botao">📖 Leituras</a>

        <a href="/canticos" class="botao">🎵 Cânticos</a>

        <a href="/escalas" class="botao">👥 Escalas de Serviço</a>

        <a href="/pedido_oracao" class="botao">
            📥 Pedido de Oração
        </a>

        <a href="/calendario" class="botao">
            📅 Calendário Pastoral
        </a>

        <br>

        <a href="/login" class="botao">
            ⚙️ Admin
        </a>

    </div>

</div>

<!-- =========================
     SCRIPT AVISOS
========================= -->
<script>

let avisos = {{ avisos | tojson | safe }};

let textoFinal = "";

if (avisos.length > 0) {

    avisos.forEach(aviso => {

        textoFinal +=
            " ✨ 📢 " +
            aviso.titulo +
            " - " +
            aviso.descricao +
            " ✨ ✦ ";

    });

} else {

    textoFinal = "Sem avisos no momento.";

}

document.getElementById("ticker-content").innerText = textoFinal;

</script>

</body>
</html>
