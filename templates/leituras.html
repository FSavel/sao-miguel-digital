<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leituras</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="overlay">

        <div class="container">

            <h1>📖 Leituras</h1>

            {% if leituras %}

                {% for leitura in leituras %}

                    <div class="card">

                        <h2>{{ leitura.tipo }}</h2>

                        <p>{{ leitura.texto }}</p>

                    </div>

                {% endfor %}

            {% else %}

                <div class="card">
                    <p>Nenhuma leitura disponível.</p>
                </div>

            {% endif %}

            <a href="/" class="voltar">
                ⬅️ Voltar ao início
            </a>

        </div>

    </div>

</body>
</html>
