<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Leituras</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container">

    <!-- TÍTULO -->

    <h1 class="titulo-principal">
        📖 Leituras
    </h1>

    <p class="frase-biblica">
        “Fala, Senhor, que o teu servo escuta.” — 1 Samuel 3:10
    </p>

    <!-- CONTEÚDO -->

    {% if leituras %}

        {% for leitura in leituras %}

            <div class="card">

                <h2>
                    {{ leitura.tipo }}
                </h2>

                <p style="white-space: pre-line;">
                    {{ leitura.texto }}
                </p>

            </div>

        {% endfor %}

    {% else %}

        <div class="card">
            <p>Nenhuma leitura disponível.</p>
        </div>

    {% endif %}

    <!-- VOLTAR -->

    <a href="/" class="botao">
        ⬅️ Voltar ao início
    </a>

</div>

</div>

</body>
</html>
