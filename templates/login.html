<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Padronização dos inputs para ficar igual aos outros formulários */
        input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .alert-box { 
            background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; font-weight: bold; font-size: 14px; border: 1px solid #f5c6cb; text-align: center;
        }
    </style>
</head>
<body>

<div class="overlay" style="display: flex; align-items: center; justify-content: center;">
    <div class="container" style="max-width: 400px;">
        <div class="card" style="padding: 25px;">
            
            <h1 style="text-align: center; margin-bottom: 20px; font-size: 24px; color: #8b0000;">
                🔐 Login Administrativo
            </h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert-box">⚠️ {{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <label style="font-weight: bold;">Utilizador</label>
                <input type="text" name="username" placeholder="Nome de administrador" required autocomplete="username">

                <label style="font-weight: bold;">Senha</label>
                <input type="password" name="password" placeholder="Introduza a senha" required autocomplete="current-password">

                <button type="submit" class="botao" style="background: #8b0000; color: white; border: none; margin-top: 10px;">
                    Entrar no Painel
                </button>
            </form>

            <div style="border-bottom: 1px solid rgba(0,0,0,0.1); margin: 25px 0;"></div>

            <a href="/" class="botao" style="background: #f0f0f0; color: #333;">⬅️ Voltar ao Início</a>

        </div>
    </div>
</div>

</body>
</html>
