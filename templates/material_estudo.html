<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Material de Estudo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1 class="titulo-principal">
            📖 Material de Estudo
        </h1>

        <p class="frase-biblica">
            Planos e conteúdos catequéticos
        </p>

        <!-- =========================
             MATERIAIS
        ========================= -->
        {% for m in materiais %}

        <div class="card">

            <h2>
                📘 {{ m.titulo }}
            </h2>

            <p>
                <b>📚 Fase:</b>
                {{ m.fase }}
            </p>

            <br>

            <p style="line-height:1.7;">
                {{ m.descricao }}
            </p>

            <!-- FUTURO PDF -->
            <!--
            <div class="area-pdf">

                <a href="#" class="botao-pdf-mini">
                    📄 Exportar PDF
                </a>

            </div>
            -->

        </div>

        {% endfor %}

        <!-- =========================
             SEM MATERIAIS
        ========================= -->
        {% if not materiais %}

        <div class="card">

            <h2>
                Sem materiais disponíveis
            </h2>

            <p>
                Ainda não existem materiais cadastrados.
            </p>

        </div>

        {% endif %}

        <!-- =========================
             VOLTAR
        ========================= -->
        <a href="/" class="botao">
            🏠 Voltar ao Início
        </a>

    </div>

</div>

</body>
</html>
