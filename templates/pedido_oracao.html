<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Pedidos de Oração</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

<div class="container">

    <!-- TÍTULO -->
    <h1 class="titulo-principal">
        🙏 Pedidos de Oração
    </h1>

    <p class="frase-biblica">
        “Orai uns pelos outros.” — Tiago 5:16
    </p>

    <!-- LISTA -->
    {% if pedidos %}

        {% for p in pedidos %}

        <div class="card">

            <h2>{{ p.nome }}</h2>

            <p><b>Categoria:</b> {{ p.categoria }}</p>

            <hr>

            <p>{{ p.pedido }}</p>

        </div>

        {% endfor %}

    {% else %}

        <div class="card">
            <p>Nenhum pedido de oração disponível.</p>
        </div>

    {% endif %}

    <!-- BOTÃO -->
    <a href="/" class="botao">
        🏠 Voltar ao Início
    </a>

</div>

</div>

</body>
</html>
