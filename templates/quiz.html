<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Catequético</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .opcao {
            display: block;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            background: #f2f2f2;
            cursor: pointer;
            transition: 0.2s;
        }

        .opcao:hover {
            background: #ddd;
        }

        .opcao.selecionada {
            background: #2ecc71;
            color: white;
        }

        .resultado {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            color: #000;
        }

        .card h3 {
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1 class="titulo-principal">🧠 Quiz Catequético</h1>

        <p class="frase-biblica">
            Teste os seus conhecimentos sobre a fé católica
        </p>

        <form id="quizForm">

            {% for q in perguntas %}

            <div class="card"
                 data-index="{{ loop.index0 }}"
                 data-resposta="{{ q.resposta_correta }}">

                <h3>❓ {{ q.pergunta }}</h3>

                <div class="opcao" onclick="selecionar(this, {{ loop.index0 }})">
                    {{ q.opcao1 }}
                </div>

                <div class="opcao" onclick="selecionar(this, {{ loop.index0 }})">
                    {{ q.opcao2 }}
                </div>

                <div class="opcao" onclick="selecionar(this, {{ loop.index0 }})">
                    {{ q.opcao3 }}
                </div>

            </div>

            {% endfor %}

            <button type="button" class="botao" onclick="corrigir()">
                ✔️ Ver Resultado
            </button>

        </form>

        <div id="resultado" class="resultado"></div>

        <br>

        <a href="/" class="botao">
            🏠 Voltar ao Início
        </a>

    </div>

</div>

<script>

let respostas = {};

function selecionar(el, index) {

    let card = el.parentElement;
    let opcoes = card.querySelectorAll(".opcao");

    opcoes.forEach(o => o.classList.remove("selecionada"));

    el.classList.add("selecionada");

    respostas[index] = el.innerText.trim();
}

function corrigir() {

    let cards = document.querySelectorAll(".card");
    let pontos = 0;

    cards.forEach((card, i) => {

        let correta = card.getAttribute("data-resposta");

        if (respostas[i] === correta) {
            pontos++;
        }

    });

    document.getElementById("resultado").innerHTML =
        "📊 Pontuação final: " + pontos + " / " + cards.length;
}

</script>

</body>
</html>
